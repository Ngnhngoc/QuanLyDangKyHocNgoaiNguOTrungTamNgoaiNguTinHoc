<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cổng Ghi Danh Trung Tâm Ngoại Ngữ</title>
    <!-- Thêm thư viện CSS Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; }
        .card { border: none; border-radius: 15px; }
        .card-header { border-radius: 15px 15px 0 0 !important; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">Đăng Ký Khóa Học Ngoại Ngữ</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="formGhiDanh">
                            <!-- NÂNG CẤP: Chuyển sang thanh chọn Môn Học -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Chọn Môn Học</label>
                                <select class="form-select" id="txtDanhMuc">
                                    <option value="">-- Đang tải danh mục... --</option>
                                </select>
                            </div>

                            <!-- NÂNG CẤP: Chuyển sang thanh chọn Trình Độ -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">Chọn Trình Độ</label>
                                <select class="form-select" id="txtTrinhDo">
                                    <option value="">-- Đang tải trình độ... --</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Mã Học Viên của bạn (VD: HV001)</label>
                                <input type="text" class="form-control" id="txtHocVien" placeholder="Nhập mã học viên..." required>
                            </div>

                            <button type="button" class="btn btn-success w-100 py-2 fw-bold" onclick="guiDangKy()">Ghi Danh Ngay</button>
                            <div class="text-center mt-3">
                                <a href="danh-sach.html" class="text-decoration-none">Xem danh sách đã đăng ký</a>
                            </div>
                        </form>
                        <div id="ketQua" class="mt-3 text-center fw-bold"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5052/api/DangKy';

        // 1. TỰ ĐỘNG TẢI DỮ LIỆU KHI MỞ TRANG
        window.onload = async function() {
            try {
                // Tải danh mục môn học
                const resDM = await fetch(`${API_BASE_URL}/danhmuc-list`);
                const dms = await resDM.json();
                const selectDM = document.getElementById('txtDanhMuc');
                selectDM.innerHTML = dms.map(d => `<option value="${d.madanhmuc}">${d.tendanhmuc}</option>`).join('');

                // Tải danh sách trình độ
                const resTD = await fetch(`${API_BASE_URL}/trinhdo-list`);
                const tds = await resTD.json();
                const selectTD = document.getElementById('txtTrinhDo');
                selectTD.innerHTML = tds.map(t => `<option value="${t.matd}">${t.tentd}</option>`).join('');
            } catch (err) {
                document.getElementById('ketQua').innerHTML = '<span class="text-danger">Lỗi: Không thể kết nối API để tải danh mục!</span>';
            }
        };

        // 2. HÀM GỬI ĐĂNG KÝ
        async function guiDangKy() {
            const duLieu = {
                maDanhMuc: document.getElementById('txtDanhMuc').value,
                maTrinhDo: document.getElementById('txtTrinhDo').value,
                maHocVien: document.getElementById('txtHocVien').value
            };

            if (!duLieu.maHocVien) {
                alert("Vui lòng nhập Mã học viên!");
                return;
            }

            const ketQuaDiv = document.getElementById('ketQua');
            ketQuaDiv.innerHTML = '<span class="text-warning">Đang xử lý...</span>';

            try {
                const response = await fetch(`${API_BASE_URL}/ghi-danh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(duLieu)
                });

                const ketQuaTraVe = await response.json();

                if (response.ok) {
                    ketQuaDiv.innerHTML = `<span class="text-success">✅ ${ketQuaTraVe.message}</span>`;
                    document.getElementById('txtHocVien').value = ''; // Reset mã học viên
                } else {
                    ketQuaDiv.innerHTML = `<span class="text-danger">❌ Lỗi: ${ketQuaTraVe.error || 'Dữ liệu đã tồn tại hoặc không hợp lệ!'}</span>`;
                }
            } catch (error) {
                ketQuaDiv.innerHTML = `<span class="text-danger">❌ Lỗi kết nối đến Server Docker!</span>`;
            }
        }
    </script>
</body>
</html>
