<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh Sách Ghi Danh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light" onload="taiDanhSach()">
    <div class="container mt-5">
    <h2 class="text-center mb-4 text-primary fw-bold">QUẢN LÝ DANH SÁCH GHI DANH</h2>

    <div class="row mb-3">
        <div class="col-md-6 offset-md-3">
            <div class="input-group shadow-sm">
                <span class="input-group-text bg-primary text-white border-0">🔍</span>
                <input type="text" id="txtSearch" class="form-control" 
                       placeholder="Nhập mã học viên hoặc tên để tìm..." onkeyup="filterTable()">
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-hover bg-white shadow-sm" id="tableGhiDanh">
            <thead class="table-dark">
                <tr>
                    <th>Mã Môn</th>
                    <th>Mã Trình Độ</th>
                    <th>Mã Học Viên</th>
                    <th>Ngày Đăng Ký</th>
                    <th class="text-end">Học Phí</th>
                    <th class="text-center">Thao tác</th>
                </tr>
            </thead>
            <tbody id="bangDuLieu">
                </tbody>
            <tfoot class="table-light fw-bold">
                <tr>
                    <td colspan="4" class="text-end text-uppercase">Tổng doanh thu dự kiến:</td>
                    <td id="tongHocPhi" class="text-end text-danger fs-5">0 VNĐ</td>
                    <td></td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>
</div> <div class="text-center mt-4 mb-5">
        <a href="index.html" class="btn btn-secondary px-4 py-2 shadow-sm fw-bold">
            ⬅️ Quay lại trang Đăng ký
        </a>
    </div>
    <script>
// HÀM TẢI DANH SÁCH VÀ TÍNH TỔNG TIỀN
async function taiDanhSach() {
    try {
        const response = await fetch('http://localhost:5052/api/DangKy/danh-sach');
        const result = await response.json();
        
        // Kiểm tra cấu trúc API trả về
        const danhSach = result.data ? result.data : result;

        const tbody = document.getElementById('bangDuLieu');
        let tongTien = 0; // Biến tích lũy tổng học phí

        // Dùng map để tạo danh sách hàng (row)
        tbody.innerHTML = danhSach.map(item => {
            // Cộng dồn học phí vào tổng
            tongTien += item.muchocphi; 

            return `
                <tr>
                    <td><span class="badge bg-secondary">${item.madanhmuc}</span></td>
                    <td>${item.matd}</td>
                    <td class="fw-bold text-primary">${item.mahv2}</td>
                    <td>${new Date(item.ngaydangky).toLocaleString('vi-VN')}</td>
                    <td class="text-end text-success fw-bold">${item.muchocphi.toLocaleString()} VNĐ</td>
                    <td class="text-center">
                        <button class="btn btn-outline-danger btn-sm" 
                            onclick="xoaDangKy('${item.madanhmuc}', '${item.matd}', '${item.mahv2}')">
                            🗑️ Xóa
                        </button>
                    </td>
                    <td class="text-center">
    <button class="btn btn-outline-warning btn-sm me-1" 
        onclick="suaDangKy('${item.madanhmuc}', '${item.matd}', '${item.mahv2}', ${item.muchocphi})">
        ✏️ Sửa
    </button>
    <button class="btn btn-outline-danger btn-sm" 
        onclick="xoaDangKy('${item.madanhmuc}', '${item.matd}', '${item.mahv2}')">
        🗑️ Xóa
    </button>
</td>
                </tr>
            `;
        }).join('');

        // Cập nhật số tiền vào Footer của bảng
        document.getElementById('tongHocPhi').innerText = tongTien.toLocaleString() + " VNĐ";
        
    } catch (error) {
        console.error('Lỗi tải dữ liệu:', error);
    }
}

// HÀM TÌM KIẾM HỌC VIÊN (LỌC TẠI CHỖ)
function filterTable() {
    const input = document.getElementById("txtSearch").value.toUpperCase();
    const rows = document.querySelector("#bangDuLieu").getElementsByTagName("tr");

    for (let row of rows) {
        // Lấy dữ liệu của toàn bộ hàng để tìm kiếm cho rộng
        const text = row.innerText.toUpperCase();
        // Nếu chứa từ khóa thì hiện, không thì ẩn
        row.style.display = text.includes(input) ? "" : "none";
    }
}

// HÀM XÓA VỚI THÔNG BÁO CHUYÊN NGHIỆP
async function xoaDangKy(maDM, maTD, maHV) {
    // Sử dụng thư viện SweetAlert2 cho đẹp (nếu em đã thêm link script ở trên)
    // Nếu chưa dùng SweetAlert2, em dùng confirm() như cũ cũng được
    if (confirm(`Bạn có chắc chắn muốn xóa đăng ký của học viên ${maHV}?`)) {
        try {
            const response = await fetch(`http://localhost:5052/api/DangKy/xoa/${maDM}/${maTD}/${maHV}`, {
                method: 'DELETE'
            });

            if (response.ok) {
                alert('Đã xóa thành công khỏi Database!');
                taiDanhSach(); // Tải lại bảng để cập nhật số tiền và danh sách
            } else {
                alert('Xóa thất bại! Vui lòng kiểm tra lại.');
            }       
        } catch (error) {
            console.error('Lỗi kết nối API:', error);
        }
    }
}
async function suaDangKy(maDM, maTD, maHV, hocPhiCu) {
    // 1. Hiện hộp thoại nhập học phí mới
    const { value: hocPhiMoi } = await Swal.fire({
        title: 'Cập nhật Học Phí',
        input: 'number',
        inputLabel: `Nhập mức học phí mới cho học viên ${maHV}`,
        inputValue: hocPhiCu, // Hiển thị sẵn số tiền cũ
        showCancelButton: true,
        confirmButtonText: '💾 Lưu thay đổi',
        cancelButtonText: 'Hủy'
    });

    // 2. Nếu người dùng có nhập số và bấm Lưu
    if (hocPhiMoi) {
        try {
            const response = await fetch(`http://localhost:5052/api/DangKy/cap-nhat/${maDM}/${maTD}/${maHV}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                // Chuyển dữ liệu thành chuỗi JSON gửi đi
                body: JSON.stringify({ mucHocPhiMoi: parseFloat(hocPhiMoi) })
            });

            if (response.ok) {
                Swal.fire('Thành công!', 'Học phí đã được cập nhật.', 'success');
                taiDanhSach(); // Tải lại bảng để thấy số tiền mới và tổng tiền thay đổi
            } else {
                Swal.fire('Lỗi!', 'Cập nhật thất bại.', 'error');
            }
        } catch (error) {
            Swal.fire('Lỗi!', 'Không thể kết nối đến máy chủ API.', 'error');
        }
    }
}
    </script>
</body>
</html>
